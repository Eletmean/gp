version: '3.8'

services:
  db:
    image: postgres:15
    container_name: game_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - game_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: game_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/game_db
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      - db
    volumes:
      - static_volume:/app/static
    networks:
      - game_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - game_network

networks:
  game_network:
    driver: bridge

volumes:
  postgres_data:
  static_volume: